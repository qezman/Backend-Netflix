name: Build and push docker image

on:
  push:
    branches: [main]

jobs:
  build-and-push-1:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout out the repo
        uses: actions/checkout@v2

      - name: Docker Build
        run: hostnamectl

  build-and-push-2:
    runs-on: ubuntu-latest
    needs: build-and-push-1

    steps:
      - name: Checkout out the repo
        uses: actions/checkout@v2

      - name: Docker Build
        run: hostnamectl

  build-and-push-3:
    runs-on: ubuntu-latest
    needs: build-and-push-2

    steps:
      - name: Checkout out the repo
        uses: actions/checkout@v2

      - name: Docker Build
        run: hostnamectl
