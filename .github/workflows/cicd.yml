name: Build and push docker image

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout out the repo
        uses: actions/checkout@v2

      # Configure AWS credentials
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # Login to ECR
      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Build Docker image
      - name: Docker Build
        run: |
          echo "${{vars.APPLICATION_PROPERTIES}}" > .application.properties
          ls -la
          cat .application.properties
          docker build -t netflix_backend:latest .

      - name: Verify Docker image locally
        run: docker images

      # Push Docker image to ECR
      - name: Push Docker image to ECR
        run: |
          docker tag netflix_backend:latest 663291012203.dkr.ecr.us-east-1.amazonaws.com/netflix_backend:${GITHUB_RUN_NUMBER}
          docker push 663291012203.dkr.ecr.us-east-1.amazonaws.com/netflix_backend:${GITHUB_RUN_NUMBER}
